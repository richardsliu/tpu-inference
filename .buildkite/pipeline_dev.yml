# Dev pipeline for tpu-inference-dev.
# Demo/sample steps showing how to run custom tests on tpu7x.
# Copy and adapt any step for your own experiments.
#
# HOW TO TRIGGER THIS PIPELINE
# ─────────────────────────────
# Option A — Buildkite UI:
#   Go to https://buildkite.com/tpu-commons/tpu-inference-dev
#   Click "New Build", set branch to your branch, click "Create Build".
#
# Option B — Buildkite API (requires BUILDKITE_API_TOKEN in your env):
#   curl -s -X POST \
#     -H "Authorization: Bearer $BUILDKITE_API_TOKEN" \
#     -H "Content-Type: application/json" \
#     "https://api.buildkite.com/v2/organizations/tpu-commons/pipelines/tpu-inference-dev/builds" \
#     -d "{\"commit\": \"$(git rev-parse HEAD)\", \"branch\": \"$(git rev-parse --abbrev-ref HEAD)\", \"message\": \"my test\"}"
#
# HOW TO CUSTOMIZE
# ─────────────────
# 1. On your branch, edit this file — use any demo step below as a starting point.
# 2. Change the command, model, env vars, or queue as needed.
# 3. Trigger the pipeline — only your branch's file is used.

steps:

  # -----------------------------------------------------------------
  # Build Step (required by all demo steps below)
  # -----------------------------------------------------------------
  - label: ":docker: Build and Push Base Image (tpu7x)"
    key: tpu7x_build_docker
    agents:
      queue: cpu_64_core
    env:
      TPU_VERSION: "tpu7x"
    commands:
      - bash -c 'source .buildkite/scripts/setup_docker_env.sh && setup_environment "vllm-tpu" "false" "true"'

  - label: "${TPU_VERSION:-tpu6e} Unit tests for google/gemma-4-26B-A4B-it"
    key: "${TPU_VERSION:-tpu6e}_google_gemma-4-26B-A4B-it_UnitTest"
    agents:
      queue: tpu_v7x_8_queue
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NIGHTLY: "1"
      MODEL_IMPL_TYPE: "flax_nnx"
      TEST_MODE: 1
    soft_fail: true
    # use 'pip install "transformers>=5.5.0" --dry-run' to check if transformers 5.5.0 is satisfied.
    # if the output contains "Would install transformers-", it means transformers 5.5.0 is not satisfied, and we should skip the test.
    # TODO(#2333): enable on v6e
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          buildkite-agent meta-data set "${TPU_VERSION:-tpu6e}_google_gemma-4-26B-A4B-it_UnitTest" "transformers version too low"
          exit 0
        fi
        if [ "${TPU_VERSION:-tpu6e}" = "tpu6e" ]; then
          buildkite-agent meta-data set "${TPU_VERSION:-tpu6e}_google_gemma-4-26B-A4B-it_UnitTest" "not enough HBM"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'USE_BATCHED_RPA_KERNEL=1 JITTED_MM_MODULE_KEYS="model.vision_tower.encoder" REGISTER_MM_MODULE_CUSTOM_PYTREE_CLASSES="transformers.modeling_outputs.BaseModelOutputWithPast" SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python /workspace/tpu_inference/examples/offline_inference.py --model google/gemma-4-26B-A4B-it --tensor-parallel-size 8 --max-num-batched-tokens 4096 --max-model-len 4096 --model-loader-extra-config "{\"enable_weights_track\": false}"'

  - label: "${TPU_VERSION:-tpu6e} Unit tests for google/gemma-4-31B-it"
    key: "${TPU_VERSION:-tpu6e}_google_gemma-4-31B-it_UnitTest"
    agents:
      queue: tpu_v7x_8_queue
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NIGHTLY: "1"
      MODEL_IMPL_TYPE: "flax_nnx"
      TEST_MODE: 1
    soft_fail: true
    # use 'pip install "transformers>=5.5.0" --dry-run' to check if transformers 5.5.0 is satisfied.
    # if the output contains "Would install transformers-", it means transformers 5.5.0 is not satisfied, and we should skip the test.
    commands:
      - |
        if pip install "transformers>=5.5.0" --dry-run | grep -q "Would install transformers-"; then
          buildkite-agent meta-data set "${TPU_VERSION:-tpu6e}_google_gemma-4-31B-it_UnitTest" "transformers version too low"
          exit 0
        fi
        .buildkite/scripts/run_in_docker.sh \
          bash -c 'USE_BATCHED_RPA_KERNEL=1 JITTED_MM_MODULE_KEYS="model.vision_tower.encoder" REGISTER_MM_MODULE_CUSTOM_PYTREE_CLASSES="transformers.modeling_outputs.BaseModelOutputWithPast" SKIP_JAX_PRECOMPILE=1 VLLM_XLA_CHECK_RECOMPILATION=0 python /workspace/tpu_inference/examples/offline_inference.py --model google/gemma-4-31B-it --tensor-parallel-size 8 --max-num-batched-tokens 4096 --max-model-len 4096 --model-loader-extra-config "{\"enable_weights_track\": false}"'


  - label: "${TPU_VERSION:-tpu6e} Performance benchmarks for Qwen/Qwen3-4B"
    key: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-4B_Benchmark"
    depends_on: "${TPU_VERSION:-tpu6e}_record_Qwen_Qwen3-4B_Accuracy"
    soft_fail: true
    agents:
      queue: tpu_v7x_8_queue
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NIGHTLY: "1"
      MODEL_IMPL_TYPE: "flax_nnx"
      TEST_MODE: 1
      TEST_MODEL: Qwen/Qwen3-4B
      TENSOR_PARALLEL_SIZE: "${TENSOR_PARALLEL_SIZE_SINGLE:-1}"
      MINIMUM_THROUGHPUT_THRESHOLD: 11.00
      INPUT_LEN: 1800
      OUTPUT_LEN: 128
      PREFIX_LEN: 0
      MAX_MODEL_LEN: 2048
      MAX_NUM_SEQS: 94
      MAX_NUM_BATCHED_TOKENS: 4096
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh

  - label: "${TPU_VERSION:-tpu6e} Performance benchmarks for Qwen/Qwen3-32B"
    key: "${TPU_VERSION:-tpu6e}_Qwen_Qwen3-32B_Benchmark"
    depends_on: "${TPU_VERSION:-tpu6e}_record_Qwen_Qwen3-32B_Accuracy"
    soft_fail: true
    agents:
      queue: tpu_v7x_8_queue
    depends_on: tpu7x_build_docker
    env:
      USE_PREBUILT_IMAGE: "1"
      TPU_VERSION: "tpu7x"
      NIGHTLY: "1"
      MODEL_IMPL_TYPE: "flax_nnx"
      TEST_MODE: 1
      TEST_MODEL: Qwen/Qwen3-32B
      TENSOR_PARALLEL_SIZE: "${TENSOR_PARALLEL_SIZE_MULTI:-8}"
      MINIMUM_THROUGHPUT_THRESHOLD: 12.46
      INPUT_LEN: 1800
      OUTPUT_LEN: 128
      PREFIX_LEN: 0
      MAX_MODEL_LEN: 2048
      MAX_NUM_SEQS: 512
      MAX_NUM_BATCHED_TOKENS: 4096
    commands:
      - |
        .buildkite/scripts/run_in_docker.sh bash /workspace/tpu_inference/tests/e2e/benchmarking/benchmark.sh
